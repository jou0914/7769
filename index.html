<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 - 籌碼分析工具</title>
    <!-- 載入截圖套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --buy-red: #d20000; 
            --sell-green: #008000; 
            --bg: #f0f2f5; 
            --card-bg: #ffffff; 
            --border: #e1e4e8;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --accent: #007bff;
        }
        
        body { 
            font-family: -apple-system, "Microsoft JhengHei", sans-serif; 
            background: var(--bg); 
            padding: 15px; 
            margin: 0; 
            color: var(--text-main); 
        }
        
        /* 主容器 */
        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            position: relative; 
        }
        
        /* 行情儀表板 */
        .price-dash { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
            gap: 15px; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border);
        }
        .price-main { 
            grid-column: span 2; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
        }
        .current-price { font-size: 38px; font-weight: 800; line-height: 1; color: var(--text-main); }
        .price-diff { font-size: 16px; font-weight: 600; margin-top: 5px; }
        
        .price-item { display: flex; flex-direction: column; justify-content: center; border-left: 1px solid #ddd; padding-left: 15px; }
        .price-label { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
        .price-val { font-size: 16px; font-weight: 600; color: #333; }

        /* 按鈕區 */
        .action-bar { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
        }
        .btn { 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            border: none; 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            transition: 0.2s; 
            text-decoration: none;
        }
        .btn-link { background: #6c757d; color: white; }
        .btn-upload { background: #007bff; color: white; position: relative; }
        .btn-screenshot { background: #6f42c1; color: white; }
        .btn:hover { opacity: 0.8; }
        input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        /* 表格區 */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: white; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f1f3f5; color: #555; font-weight: 600; }
        
        .buy-head { background: #fff1f0 !important; color: var(--buy-red); border-top: 3px solid var(--buy-red); }
        .sell-head { background: #f6ffed !important; color: var(--sell-green); border-top: 3px solid var(--sell-green); }
        .up { color: var(--buy-red); font-weight: bold; }
        .down { color: var(--sell-green); font-weight: bold; }

        /* 截圖預覽層 */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; padding: 20px; 
        }
        #previewImg { max-width: 100%; max-height: 80%; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-btn { margin-top: 20px; background: white; color: black; padding: 10px 40px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr; } 
            .price-main { grid-column: span 1; border-bottom: 1px solid #eee; padding-bottom: 10px; }
            .price-item { border-left: none; padding-left: 0; }
            .current-price { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <!-- 標題列 -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div>
            <h2 style="margin:0; font-size: 24px; color: #333;">7769 鴻勁</h2>
            <div style="font-size: 13px; color: var(--text-sub);">上市半導體 | 分點進出明細分析</div>
        </div>
        <div id="trade-date" style="text-align: right; font-size: 13px; color: var(--text-sub); font-weight: bold;"></div>
    </div>

    <!-- 行情儀表板 -->
    <div id="price-dashboard" class="price-dash">
        <div class="price-main">
            <div id="cur-price" class="current-price">----</div>
            <div id="cur-diff" class="price-diff">-- ( --% )</div>
        </div>
        <div class="price-item">
            <span class="price-label">開盤</span>
            <span id="p-open" class="price-val">--</span>
        </div>
        <div class="price-item">
            <span class="price-label">最高</span>
            <span id="p-high" class="price-val">--</span>
        </div>
        <div class="price-item">
            <span class="price-label">最低</span>
            <span id="p-low" class="price-val">--</span>
        </div>
        <div class="price-item">
            <span class="price-label">成交量</span>
            <span id="p-vol" class="price-val">--</span>
        </div>
    </div>
    
    <!-- 操作按鈕 -->
    <div class="action-bar" data-html2canvas-ignore>
        <a href="https://bsr.twse.com.tw/bshtm/" target="_blank" class="btn btn-link">🔗 證交所查詢</a>
        <div class="btn btn-upload">
            📁 上傳分點 CSV
            <input type="file" id="csvFile" accept=".csv">
        </div>
        <button onclick="generatePreview()" id="shotBtn" class="btn btn-screenshot">📸 產生分享截圖</button>
    </div>

    <div id="status" style="text-align: center; font-size: 13px; color: #999; margin-bottom: 15px;" data-html2canvas-ignore>
        請上傳證交所 CSV 檔案以顯示籌碼排行
    </div>

    <!-- 籌碼排行結果 -->
    <div id="result" class="grid" style="display:none;">
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="buy-head">買超前十名 (張)</th></tr>
                    <tr><th>券商分點</th><th>買/賣</th><th>買超</th></tr>
                </thead>
                <tbody id="buy-body"></tbody>
            </table>
        </div>
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="sell-head">賣超前十名 (張)</th></tr>
                    <tr><th>券商分點</th><th>買/賣</th><th>賣超</th></tr>
                </thead>
                <tbody id="sell-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 截圖預覽層 -->
<div id="overlay">
    <div style="color:white; margin-bottom:15px; font-weight: bold; text-align: center;">截圖已產生！<br>請長按圖片「拷貝」或「儲存」</div>
    <img id="previewImg" src="" alt="截圖預覽">
    <div class="close-btn" onclick="document.getElementById('overlay').style.display='none'">關閉預覽</div>
</div>

<script>
    // --- 1. 處理 4/23 行情數據 ---
    const stockJson = {
        "stat":"OK",
        "date":"20260423",
        "data":[
            ["115/04/23","2,376,739","11,384,486,900","4,900.00","4,980.00","4,560.00","4,810.00","+65.00","11,554",""]
        ]
    };

    function initPriceDashboard(json) {
        const last = json.data[json.data.length - 1];
        const date = last[0];
        const vol = Math.round(parseInt(last[1].replace(/,/g,'')) / 1000);
        const open = last[3];
        const high = last[4];
        const low = last[5];
        const close = last[6];
        const diffText = last[7];
        const diffVal = parseFloat(diffText);
        
        const prevClose = parseFloat(close.replace(/,/g,'')) - diffVal;
        const percent = ((diffVal / prevClose) * 100).toFixed(2);
        
        const color = diffVal > 0 ? 'var(--buy-red)' : (diffVal < 0 ? 'var(--sell-green)' : 'var(--text-main)');
        const sign = diffVal > 0 ? '▲' : (diffVal < 0 ? '▼' : '');

        document.getElementById('trade-date').innerText = "日期：" + date;
        document.getElementById('cur-price').innerText = close;
        document.getElementById('cur-price').style.color = color;
        document.getElementById('cur-diff').innerText = `${sign} ${Math.abs(diffVal)} (${percent}%)`;
        document.getElementById('cur-diff').style.color = color;
        
        document.getElementById('p-open').innerText = open;
        document.getElementById('p-high').innerText = high;
        document.getElementById('p-low').innerText = low;
        document.getElementById('p-vol').innerText = vol + " 張";
    }

    initPriceDashboard(stockJson);

    // --- 2. 處理 CSV 解析 ---
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsText(file, 'Big5');
        reader.onload = function(event) {
            parseTwseCsv(event.target.result);
        };
    });

    function parseTwseCsv(text) {
        const lines = text.split('\n');
        const brokerMap = {};
        lines.forEach(line => {
            const cols = line.replace(/"/g, '').split(',');
            if (cols.length >= 5) processRow(cols[1], cols[3], cols[4], brokerMap);
            if (cols.length >= 11) processRow(cols[7], cols[9], cols[10], brokerMap);
        });
        const resultArr = Object.keys(brokerMap).map(name => {
            const d = brokerMap[name];
            const net = Math.round((d.buy - d.sell) / 1000);
            return {
                name: name.replace(/^\d{4}\s*/, ''), 
                buy: Math.round(d.buy / 1000),
                sell: Math.round(d.sell / 1000),
                net: net
            };
        });
        renderTables(resultArr);
    }

    function processRow(name, buy, sell, map) {
        if (!name || name.trim() === "" || name.includes("券商")) return;
        const b = parseFloat(buy) || 0;
        const s = parseFloat(sell) || 0;
        if (!map[name]) map[name] = { buy: 0, sell: 0 };
        map[name].buy += b;
        map[name].sell += s;
    }

    function renderTables(arr) {
        const buyList = arr.filter(i => i.net > 0).sort((a, b) => b.net - a.net).slice(0, 10);
        const sellList = arr.filter(i => i.net < 0).sort((a, b) => Math.abs(b.net) - Math.abs(a.net)).slice(0, 10);

        document.getElementById('buy-body').innerHTML = buyList.map(i => `
            <tr>
                <td style="text-align:left; font-weight:500;">${i.name}</td>
                <td style="color:#888; font-size:11px;">${i.buy}/${i.sell}</td>
                <td class="up">${i.net}</td>
            </tr>
        `).join('');

        document.getElementById('sell-body').innerHTML = sellList.map(i => `
            <tr>
                <td style="text-align:left; font-weight:500;">${i.name}</td>
                <td style="color:#888; font-size:11px;">${i.buy}/${i.sell}</td>
                <td class="down">${Math.abs(i.net)}</td>
            </tr>
        `).join('');

        document.getElementById('result').style.display = 'grid';
        document.getElementById('status').style.display = 'none';
    }

    // --- 3. 截圖功能 ---
    async function generatePreview() {
        const btn = document.getElementById('shotBtn');
        btn.innerText = "正在產生...";
        try {
            const canvas = await html2canvas(document.querySelector("#captureArea"), {
                scale: 2,
                backgroundColor: "#ffffff",
                useCORS: true
            });
            document.getElementById('previewImg').src = canvas.toDataURL("image/png");
            document.getElementById('overlay').style.display = "flex";
            btn.innerText = "📸 產生分享截圖";
        } catch (err) {
            alert("截圖失敗");
            btn.innerText = "📸 產生分享截圖";
        }
    }
</script>

</body>
</html>
