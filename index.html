<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 - 籌碼分析工具</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --buy-red: #ef5350; --sell-green: #66bb6a; --bg: #f4f7f9; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; margin: 0; }
        
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
        
        .action-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; text-decoration: none; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        
        .btn-link { background: #2c3e50; color: white; }
        .btn-upload { background: #007bff; color: white; position: relative; }
        .btn-copy { background: #673ab7; color: white; } /* 複製按鈕紫色 */
        
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .summary { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; font-weight: bold; border: 1px solid #eee; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px 8px; text-align: center; }
        th { background: #f8f9fa; color: #555; }
        .buy-head { background: var(--buy-red) !important; color: white; }
        .sell-head { background: var(--sell-green) !important; color: white; }
        .up { color: #d20000; font-weight: bold; }
        .down { color: #008000; font-weight: bold; }
        
        #status { text-align: center; margin-bottom: 10px; color: #666; font-size: 14px; }
        
        /* 提示訊息樣式 */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 1000; }

        @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <h2 style="text-align:center; margin-top:0;">7769 鴻勁 - 籌碼分析工具</h2>
    
    <div class="action-bar" data-html2canvas-ignore>
        <a href="https://bsr.twse.com.tw/bshtm/" target="_blank" class="btn btn-link">🔗 開啟證交所</a>
        
        <div class="btn btn-upload">
            📁 選擇 CSV 檔案
            <input type="file" id="csvFile" accept=".csv">
        </div>

        <button onclick="copyScreenshot()" id="copyBtn" class="btn btn-copy">📋 截圖至剪貼簿</button>
    </div>

    <div id="status">請先下載 CSV 檔案後上傳</div>

    <div id="summary-info" class="summary" style="display:none;">
        <span style="color:var(--buy-red)">總買進：<span id="total-buy">0</span> 張</span>
        <span style="color:var(--sell-green)">總賣出：<span id="total-sell">0</span> 張</span>
    </div>

    <div id="result" class="grid" style="display:none;">
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="buy-head">買超前十名 (張)</th></tr>
                    <tr><th>券商分點</th><th>買/賣</th><th>買超</th></tr>
                </thead>
                <tbody id="buy-body"></tbody>
            </table>
        </div>
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="sell-head">賣超前十名 (張)</th></tr>
                    <tr><th>券商分點</th><th>買/賣</th><th>賣超</th></tr>
                </thead>
                <tbody id="sell-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast">已複製到剪貼簿！</div>

<script>
    // --- 截圖並複製到剪貼簿 ---
    async function copyScreenshot() {
        const btn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const originalText = btn.innerHTML;

        try {
            btn.disabled = true;
            btn.innerText = "⏳ 處理中...";

            const canvas = await html2canvas(document.querySelector("#captureArea"), {
                scale: 2,
                useCORS: true,
                backgroundColor: "#ffffff"
            });

            // 將 canvas 轉為 Blob
            canvas.toBlob(async (blob) => {
                try {
                    const data = [new ClipboardItem({ [blob.type]: blob })];
                    await navigator.clipboard.write(data);
                    
                    // 成功回饋
                    btn.innerHTML = "✅ 已複製";
                    toast.style.display = "block";
                    setTimeout(() => {
                        toast.style.display = "none";
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }, 2000);
                } catch (err) {
                    throw new Error("剪貼簿寫入失敗");
                }
            }, "image/png");

        } catch (err) {
            console.error(err);
            alert("複製失敗！請確保網頁在 HTTPS 環境下執行，或嘗試手動截圖。");
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // --- CSV 解析功能 ---
    const fileInput = document.getElementById('csvFile');
    const status = document.getElementById('status');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        status.innerText = "正在解析數據...";
        const reader = new FileReader();
        reader.readAsText(file, 'Big5');
        reader.onload = function(event) {
            try {
                parseTwseCsv(event.target.result);
            } catch (err) {
                status.innerText = "❌ 解析失敗";
            }
        };
    });

    function parseTwseCsv(text) {
        const lines = text.split('\n');
        const brokerMap = {};
        let totalBuyQty = 0;
        let totalSellQty = 0;

        lines.forEach((line) => {
            const cols = line.replace(/"/g, '').split(',');
            if (cols.length >= 5) {
                processRow(cols[1], cols[3], cols[4], brokerMap, (b, s) => {
                    totalBuyQty += b; totalSellQty += s;
                });
            }
            if (cols.length >= 11) {
                processRow(cols[7], cols[9], cols[10], brokerMap, (b, s) => {
                    totalBuyQty += b; totalSellQty += s;
                });
            }
        });

        let resultArr = Object.keys(brokerMap).map(name => {
            const d = brokerMap[name];
            const net = Math.round((d.buy - d.sell) / 1000);
            return {
                name: name.replace(/^\d{4}\s*/, ''), 
                buy: Math.round(d.buy / 1000),
                sell: Math.round(d.sell / 1000),
                net: net
            };
        });

        const buyList = resultArr.filter(i => i.net > 0).sort((a, b) => b.net - a.net).slice(0, 10);
        const sellList = resultArr.filter(i => i.net < 0).sort((a, b) => Math.abs(b.net) - Math.abs(a.net)).slice(0, 10);

        document.getElementById('total-buy').innerText = Math.round(totalBuyQty / 1000);
        document.getElementById('total-sell').innerText = Math.round(totalSellQty / 1000);
        document.getElementById('summary-info').style.display = 'flex';

        renderTable('buy-body', buyList, 'up');
        renderTable('sell-body', sellList, 'down');

        document.getElementById('result').style.display = 'grid';
        status.innerText = "✅ 分析完成！";
    }

    function processRow(name, buy, sell, map, callback) {
        if (!name) return;
        const brokerName = name.trim();
        if (brokerName === "" || brokerName === "券商" || brokerName === "序號") return;
        const bQty = parseFloat(buy) || 0;
        const sQty = parseFloat(sell) || 0;
        if (!isNaN(bQty) && (bQty > 0 || sQty > 0)) {
            if (!map[brokerName]) map[brokerName] = { buy: 0, sell: 0 };
            map[brokerName].buy += bQty;
            map[brokerName].sell += sQty;
            callback(bQty, sQty);
        }
    }

    function renderTable(id, list, css) {
        document.getElementById(id).innerHTML = list.map(item => `
            <tr>
                <td style="text-align:left">${item.name}</td>
                <td style="color:#888; font-size:11px;">${item.buy} / ${item.sell}</td>
                <td class="${css}">${Math.abs(item.net)}</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
