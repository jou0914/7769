<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: "Microsoft JhengHei", sans-serif; padding: 20px; }
    .card { border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); border: none; overflow: hidden; }
    .header-bar { background: #1565c0; color: white; padding: 25px; text-align: center; }
    .table thead { background: #f8f9fa; }
    .qty-text { font-weight: 700; text-align: right; }
    #loader { padding: 60px; text-align: center; }
  </style>
</head>
<body>

<div class="container" style="max-width: 900px;">
  <div class="card">
    <div class="header-bar">
      <h2 class="mb-1">7769 鴻勁 分點買賣超排行</h2>
      <p id="info" class="mb-0 opacity-75">正在同步市場數據...</p>
    </div>
    
    <div class="p-4 bg-white">
      <div id="loader">
        <div class="spinner-grow text-primary" role="status"></div>
        <p class="mt-3 text-muted">連線至交易所數據源...</p>
      </div>

      <div id="result" class="row d-none">
        <div class="col-md-6 border-end">
          <h5 class="text-success fw-bold mb-3">🟢 買超前 10 名 (張)</h5>
          <table class="table table-hover">
            <thead><tr><th>券商分點</th><th class="text-end">買超</th></tr></thead>
            <tbody id="buyContent"></tbody>
          </table>
        </div>
        <div class="col-md-6">
          <h5 class="text-danger fw-bold mb-3">🔴 賣超前 10 名 (張)</h5>
          <table class="table table-hover">
            <thead><tr><th>券商分點</th><th class="text-end">賣超</th></tr></thead>
            <tbody id="sellContent"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 初始化載入數據
  window.onload = () => {
    google.script.run
      .withSuccessHandler(updateUI)
      .getStockData('7769');
  };

  function updateUI(res) {
    if (res.error) {
      document.getElementById('loader').innerHTML = `<div class="alert alert-warning">${res.error}</div>`;
      return;
    }
    
    document.getElementById('info').innerText = `數據日期：${res.date}`;
    
    const renderTable = (list, targetId, colorClass) => {
      document.getElementById(targetId).innerHTML = list.map(item => `
        <tr>
          <td class="text-secondary">${item.name}</td>
          <td class="qty-text ${colorClass}">${item.qty}</td>
        </tr>
      `).join('');
    };

    renderTable(res.buy, 'buyContent', 'text-success');
    renderTable(res.sell, 'sellContent', 'text-danger');

    document.getElementById('loader').classList.add('d-none');
    document.getElementById('result').classList.remove('d-none');
  }
</script>
</body>
</html>
