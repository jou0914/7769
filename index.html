<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 - 籌碼全量分析</title>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .upload-box { border: 2px dashed #007bff; padding: 30px; text-align: center; border-radius: 10px; background: #f8fbff; margin-bottom: 20px; }
        .btn-select { background: #007bff; color: white; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block; }
        .summary { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; padding: 15px; background: #eee; border-radius: 8px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #eee; padding: 10px 5px; text-align: center; }
        .buy-head { background: #ff4d4f; color: white; }
        .sell-head { background: #52c41a; color: white; }
        .up { color: #d20000; font-weight: bold; }
        .down { color: #008000; font-weight: bold; }
        input[type="file"] { display: none; }
        #status { margin-top: 10px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">7769 鴻勁 - 分點進出全量分析</h2>
    
    <div class="upload-box">
        <p>請上傳證交所下載的 <b>分點進出明細 CSV</b> (序號至 3528)</p>
        <label for="csvFile" class="btn-select">選擇檔案並分析</label>
        <input type="file" id="csvFile" accept=".csv">
        <div id="status">等待檔案上傳...</div>
    </div>

    <div id="summary-info" class="summary" style="display:none;">
        <span style="color:#d20000">總買進：<span id="total-buy">0</span> 張</span>
        <span style="color:#008000">總賣出：<span id="total-sell">0</span> 張</span>
        <span style="color:#007bff">淨成交：<span id="total-net">0</span> 張</span>
    </div>

    <div id="result" class="grid" style="display:none;">
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="buy-head">買超前十名 (張)</th></tr>
                    <tr><th>券商分點</th><th>買/賣</th><th>買超</th></tr>
                </thead>
                <tbody id="buy-body"></tbody>
            </table>
        </div>
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="sell-head">賣超前十名 (張)</th></tr>
                    <tr><th>券商分點</th><th>買/賣</th><th>賣超</th></tr>
                </thead>
                <tbody id="sell-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('status').innerText = "正在解析巨量資料...";
        const reader = new FileReader();
        reader.readAsText(file, 'Big5');
        reader.onload = function(event) {
            parseTwseCsv(event.target.result);
        };
    });

    function parseTwseCsv(text) {
        const lines = text.split('\n');
        const brokerMap = {};
        let totalBuyQty = 0;
        let totalSellQty = 0;

        lines.forEach((line) => {
            // 移除引號並分割
            const cols = line.replace(/"/g, '').split(',');
            
            // 左半邊處理：[1]券商, [3]買進股數, [4]賣出股數
            if (cols.length >= 5) {
                const name = cols[1] ? cols[1].trim() : "";
                const buy = parseFloat(cols[3]) || 0;
                const sell = parseFloat(cols[4]) || 0;
                if (name && name !== "券商" && !isNaN(buy)) {
                    updateMap(brokerMap, name, buy, sell);
                    totalBuyQty += buy;
                    totalSellQty += sell;
                }
            }

            // 右半邊處理：[7]券商, [9]買進股數, [10]賣出股數
            if (cols.length >= 11) {
                const name = cols[7] ? cols[7].trim() : "";
                const buy = parseFloat(cols[9]) || 0;
                const sell = parseFloat(cols[10]) || 0;
                if (name && name !== "券商" && !isNaN(buy)) {
                    updateMap(brokerMap, name, buy, sell);
                    totalBuyQty += buy;
                    totalSellQty += sell;
                }
            }
        });

        // 整理數據
        let resultArr = Object.keys(brokerMap).map(name => {
            const d = brokerMap[name];
            const net = Math.round((d.buy - d.sell) / 1000);
            return {
                // 移除券商代碼數字，只留名稱
                name: name.replace(/^\w+\s*/, ''), 
                buy: Math.round(d.buy / 1000),
                sell: Math.round(d.sell / 1000),
                net: net
            };
        });

        // 排序
        const buyList = resultArr.filter(i => i.net > 0).sort((a, b) => b.net - a.net).slice(0, 10);
        const sellList = resultArr.filter(i => i.net < 0).sort((a, b) => Math.abs(b.net) - Math.abs(a.net)).slice(0, 10);

        // 更新統計資訊
        document.getElementById('total-buy').innerText = Math.round(totalBuyQty / 1000);
        document.getElementById('total-sell').innerText = Math.round(totalSellQty / 1000);
        document.getElementById('total-net').innerText = Math.round(totalBuyQty / 1000); // 成交量通常看單邊
        document.getElementById('summary-info').style.display = 'flex';

        renderTable('buy-body', buyList, 'up');
        renderTable('sell-body', sellList, 'down');

        document.getElementById('result').style.display = 'grid';
        document.getElementById('status').innerText = "分析完成！共處理 3528 筆明細。";
    }

    function updateMap(map, name, buy, sell) {
        if (!map[name]) map[name] = { buy: 0, sell: 0 };
        map[name].buy += buy;
        map[name].sell += sell;
    }

    function renderTable(id, list, css) {
        document.getElementById(id).innerHTML = list.map(item => `
            <tr>
                <td style="text-align:left">${item.name}</td>
                <td style="color:#888; font-size:11px;">${item.buy} / ${item.sell}</td>
                <td class="${css}">${Math.abs(item.net)}</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
