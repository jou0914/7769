<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 - 籌碼分析工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --buy-red: #d20000; 
            --sell-green: #008000; 
            --bg: #f0f2f5; 
            --card-bg: #ffffff; 
            --border: #e1e4e8;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --accent: #007bff;
        }
        
        body { 
            font-family: -apple-system, "Microsoft JhengHei", sans-serif; 
            background: var(--bg); 
            padding: 15px; 
            margin: 0; 
            color: var(--text-main); 
        }
        
        .container { 
            max-width: 1000px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            position: relative; 
        }
        
        .price-dash { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
            gap: 15px; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border);
        }
        .price-main { 
            grid-column: span 2; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
        }
        .current-price { font-size: 38px; font-weight: 800; line-height: 1; color: var(--text-main); }
        .price-diff { font-size: 16px; font-weight: 600; margin-top: 5px; }
        
        .price-item { display: flex; flex-direction: column; justify-content: center; border-left: 1px solid #ddd; padding-left: 15px; }
        .price-label { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
        .price-val { font-size: 16px; font-weight: 600; color: #333; }

        .action-bar { 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
        }
        .btn { 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            border: none; 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            transition: 0.2s; 
            text-decoration: none;
        }
        .btn-fetch { background: #28a745; color: white; }
        .btn-link { background: #6c757d; color: white; }
        .btn-upload { background: #007bff; color: white; position: relative; }
        .btn-screenshot { background: #6f42c1; color: white; }
        .btn:hover { opacity: 0.8; }
        input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background: white; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f1f3f5; color: #555; font-weight: 600; }
        
        .buy-head { background: #fff1f0 !important; color: var(--buy-red); border-top: 3px solid var(--buy-red); }
        .sell-head { background: #f6ffed !important; color: var(--sell-green); border-top: 3px solid var(--sell-green); }
        .up { color: var(--buy-red); font-weight: bold; }
        .down { color: var(--sell-green); font-weight: bold; }

        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; padding: 20px; 
        }
        #previewImg { max-width: 100%; max-height: 80%; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .close-btn { margin-top: 20px; background: white; color: black; padding: 10px 40px; border-radius: 25px; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr; } 
            .price-main { grid-column: span 1; border-bottom: 1px solid #eee; padding-bottom: 10px; }
            .price-item { border-left: none; padding-left: 0; }
            .current-price { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div>
            <h2 style="margin:0; font-size: 24px; color: #333;">7769 鴻勁</h2>
            <div style="font-size: 13px; color: var(--text-sub);">上市半導體 | 智慧行情與籌碼分析</div>
        </div>
        <div style="text-align: right;">
            <div id="trade-date" style="font-size: 13px; color: var(--text-sub); font-weight: bold;">同步中...</div>
            <div id="data-source" style="font-size: 10px; color: #aaa;">來源偵測中</div>
        </div>
    </div>

    <!-- 行情儀表板 -->
    <div id="price-dashboard" class="price-dash">
        <div class="price-main">
            <div id="cur-price" class="current-price">----</div>
            <div id="cur-diff" class="price-diff">-- ( --% )</div>
        </div>
        <div class="price-item">
            <span class="price-label">開盤</span>
            <span id="p-open" class="price-val">--</span>
        </div>
        <div class="price-item">
            <span class="price-label">最高</span>
            <span id="p-high" class="price-val">--</span>
        </div>
        <div class="price-item">
            <span class="price-label">最低</span>
            <span id="p-low" class="price-val">--</span>
        </div>
        <div class="price-item">
            <span class="price-label">成交量</span>
            <span id="p-vol" class="price-val">--</span>
        </div>
    </div>
    
    <div class="action-bar" data-html2canvas-ignore>
        <button onclick="initDataFlow()" class="btn btn-fetch">🔄 重新同步行情</button>
        <a href="https://bsr.twse.com.tw/bshtm/" target="_blank" class="btn btn-link">🔗 證交所查詢</a>
        <div class="btn btn-upload">
            📁 上傳分點 CSV
            <input type="file" id="csvFile" accept=".csv">
        </div>
        <button onclick="generatePreview()" id="shotBtn" class="btn btn-screenshot">📸 產生分享截圖</button>
    </div>

    <div id="status" style="text-align: center; font-size: 13px; color: #999; margin-bottom: 15px;" data-html2canvas-ignore>
        請上傳證交所 CSV 檔案以顯示籌碼排行
    </div>

    <div id="result" class="grid" style="display:none;">
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="buy-head">買超前十名 (張)</th></tr>
                    <tr><th>券商分點</th><th>買/賣</th><th>買超</th></tr>
                </thead>
                <tbody id="buy-body"></tbody>
            </table>
        </div>
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="sell-head">賣超前十名 (張)</th></tr>
                    <tr><th>券商分點</th><th>買/賣</th><th>賣超</th></tr>
                </thead>
                <tbody id="sell-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="overlay">
    <div style="color:white; margin-bottom:15px; font-weight: bold; text-align: center;">截圖已產生！<br>請長按圖片「拷貝」或「儲存」</div>
    <img id="previewImg" src="" alt="截圖預覽">
    <div class="close-btn" onclick="document.getElementById('overlay').style.display='none'">關閉預覽</div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxi2Xm_MZ1Bak8sAIfC-MiPaHERwuqpz8eSh8yRUy5efO8sa6Mur_XJ95BHhqYtKnJ7ww/exec';
    const STOCK_ID = '7769';

    // --- 1. 智慧雙重抓取邏輯 ---
    async function initDataFlow() {
        const sourceLabel = document.getElementById('data-source');
        const dateLabel = document.getElementById('trade-date');
        
        // 取得今天日期的民國格式 (例如 115/04/24)
        const now = new Date();
        const todayMinguo = `${now.getFullYear() - 1911}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;

        // 優先嘗試 1: 證交所 API
        sourceLabel.innerText = "正在嘗試證交所直連...";
        let twseData = await fetchLatestPrice();

        if (twseData) {
            // 檢查日期是否為今天
            if (twseData.date === todayMinguo) {
                updateDashboard(twseData);
                sourceLabel.innerText = "來源：證交所官方 (今日數據)";
                return;
            } else {
                console.log("證交所僅有舊資料，嘗試 GAS 備援...");
            }
        }

        // 如果抓不到或抓到昨天的，嘗試 2: GAS 雲端
        sourceLabel.innerText = "證交所無今日資料，切換 GAS 備援...";
        let gasData = await fetchFromGAS();
        
        if (gasData) {
            updateDashboard(gasData);
            sourceLabel.innerText = "來源：GAS 雲端備援";
        } else if (twseData) {
            // 如果 GAS 也失敗，但至少有證交所的舊資料，就顯示舊的
            updateDashboard(twseData);
            sourceLabel.innerText = "來源：證交所官方 (僅有舊資料)";
        } else {
            dateLabel.innerText = "行情同步失敗";
            sourceLabel.innerText = "請檢查網路連線";
        }
    }

    // 抓取證交所
    async function fetchLatestPrice() {
        const targetUrl = `https://www.twse.com.tw/rwd/zh/afterTrading/STOCK_DAY?stockNo=${STOCK_ID}&response=json&_=${Date.now()}`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const json = JSON.parse(data.contents);
            if (json.stat === "OK" && json.data) {
                const last = json.data[json.data.length - 1];
                return {
                    date: last[0],
                    vol: Math.round(parseInt(last[1].replace(/,/g,'')) / 1000),
                    open: last[3],
                    high: last[4],
                    low: last[5],
                    close: last[6],
                    diff: last[7]
                };
            }
        } catch (e) { return null; }
        return null;
    }

    // 抓取 GAS
    async function fetchFromGAS() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            if (data.data && data.data.length > 0) {
                const last = data.data[data.data.length - 1];
                return {
                    date: last[0],
                    vol: Math.round(parseInt(last[1].replace(/,/g,'')) / 1000),
                    open: last[3],
                    high: last[4],
                    low: last[5],
                    close: last[6],
                    diff: last[7]
                };
            } else {
                // 處理 Yahoo 格式或其他單一價格格式
                let price = data.chart?.result[0]?.meta?.regularMarketPrice || data.price || data;
                if (price && !isNaN(price)) {
                    return { date: "即時行情", close: price, diff: "0", open: "--", high: "--", low: "--", vol: "--" };
                }
            }
        } catch (e) { return null; }
        return null;
    }

    function updateDashboard(info) {
        const close = info.close;
        const diffText = info.diff.toString();
        const diffVal = parseFloat(diffText.replace('+', '').replace('X', '0'));
        
        const prevClose = parseFloat(close.toString().replace(/,/g,'')) - diffVal;
        const percent = prevClose !== 0 ? ((diffVal / prevClose) * 100).toFixed(2) : "0.00";
        
        const color = diffVal > 0 ? 'var(--buy-red)' : (diffVal < 0 ? 'var(--sell-green)' : 'var(--text-main)');
        const sign = diffVal > 0 ? '▲' : (diffVal < 0 ? '▼' : '');

        document.getElementById('trade-date').innerText = "日期：" + info.date;
        document.getElementById('cur-price').innerText = close;
        document.getElementById('cur-price').style.color = color;
        document.getElementById('cur-diff').innerText = `${sign} ${Math.abs(diffVal)} (${percent}%)`;
        document.getElementById('cur-diff').style.color = color;
        
        document.getElementById('p-open').innerText = info.open;
        document.getElementById('p-high').innerText = info.high;
        document.getElementById('p-low').innerText = info.low;
        document.getElementById('p-vol').innerText = info.vol + (info.vol !== "--" ? " 張" : "");
    }

    // 初始執行
    initDataFlow();

    // --- 2. 處理 CSV 解析 ---
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsText(file, 'Big5');
        reader.onload = function(event) {
            parseTwseCsv(event.target.result);
        };
    });

    function parseTwseCsv(text) {
        const lines = text.split('\n');
        const brokerMap = {};
        lines.forEach(line => {
            const cols = line.replace(/"/g, '').split(',');
            if (cols.length >= 5) processRow(cols[1], cols[3], cols[4], brokerMap);
            if (cols.length >= 11) processRow(cols[7], cols[9], cols[10], brokerMap);
        });
        const resultArr = Object.keys(brokerMap).map(name => {
            const d = brokerMap[name];
            const net = Math.round((d.buy - d.sell) / 1000);
            return {
                name: name.replace(/^\d{4}\s*/, ''), 
                buy: Math.round(d.buy / 1000),
                sell: Math.round(d.sell / 1000),
                net: net
            };
        });
        renderTables(resultArr);
    }

    function processRow(name, buy, sell, map) {
        if (!name || name.trim() === "" || name.includes("券商")) return;
        const b = parseFloat(buy) || 0;
        const s = parseFloat(sell) || 0;
        if (!map[name]) map[name] = { buy: 0, sell: 0 };
        map[name].buy += b;
        map[name].sell += s;
    }

    function renderTables(arr) {
        const buyList = arr.filter(i => i.net > 0).sort((a, b) => b.net - a.net).slice(0, 10);
        const sellList = arr.filter(i => i.net < 0).sort((a, b) => Math.abs(b.net) - Math.abs(a.net)).slice(0, 10);

        document.getElementById('buy-body').innerHTML = buyList.map(i => `
            <tr>
                <td style="text-align:left; font-weight:500;">${i.name}</td>
                <td style="color:#888; font-size:11px;">${i.buy}/${i.sell}</td>
                <td class="up">${i.net}</td>
            </tr>
        `).join('');

        document.getElementById('sell-body').innerHTML = sellList.map(i => `
            <tr>
                <td style="text-align:left; font-weight:500;">${i.name}</td>
                <td style="color:#888; font-size:11px;">${i.buy}/${i.sell}</td>
                <td class="down">${Math.abs(i.net)}</td>
            </tr>
        `).join('');

        document.getElementById('result').style.display = 'grid';
        document.getElementById('status').style.display = 'none';
    }

    // --- 3. 截圖功能 ---
    async function generatePreview() {
        const btn = document.getElementById('shotBtn');
        btn.innerText = "正在產生...";
        try {
            const canvas = await html2canvas(document.querySelector("#captureArea"), {
                scale: 2,
                backgroundColor: "#ffffff",
                useCORS: true
            });
            document.getElementById('previewImg').src = canvas.toDataURL("image/png");
            document.getElementById('overlay').style.display = "flex";
            btn.innerText = "📸 產生分享截圖";
        } catch (err) {
            alert("截圖失敗");
            btn.innerText = "📸 產生分享截圖";
        }
    }
</script>

</body>
</html>
