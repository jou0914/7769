<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 - 籌碼分析工具</title>
    <!-- 換一個更穩定的 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --buy-red: #ef5350; --sell-green: #66bb6a; --bg: #f4f7f9; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .action-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; }
        
        .btn-link { background: #2c3e50; color: white; }
        .btn-upload { background: #007bff; color: white; position: relative; }
        .btn-screenshot { background: #673ab7; color: white; }
        
        input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .summary { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; padding: 12px; background: #f8f9fa; border-radius: 10px; font-weight: bold; border: 1px solid #eee; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; background: white; }
        th, td { border: 1px solid #eee; padding: 10px 5px; text-align: center; }
        th { background: #f8f9fa; color: #555; }
        .buy-head { background: var(--buy-red) !important; color: white; }
        .sell-head { background: var(--sell-green) !important; color: white; }
        .up { color: #d20000; font-weight: bold; }
        .down { color: #008000; font-weight: bold; }
        
        #status { text-align: center; margin-bottom: 10px; color: #666; font-size: 13px; }

        /* 彈出視窗樣式 */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 20px; box-sizing: border-box; }
        #previewImg { max-width: 100%; max-height: 80%; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .overlay-tip { color: white; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .close-btn { margin-top: 20px; background: white; color: black; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <h2 style="text-align:center; margin-top:0; font-size: 20px;">7769 鴻勁 - 籌碼分析工具</h2>
    
    <div class="action-bar" data-html2canvas-ignore>
        <a href="https://bsr.twse.com.tw/bshtm/" target="_blank" class="btn btn-link">🔗 開啟證交所</a>
        
        <div class="btn btn-upload">
            📁 選擇 CSV
            <input type="file" id="csvFile" accept=".csv">
        </div>

        <button onclick="generatePreview()" id="shotBtn" class="btn btn-screenshot">📸 產生截圖</button>
    </div>

    <div id="status">請先下載 CSV 檔案後上傳</div>

    <div id="summary-info" class="summary" style="display:none;">
        <span style="color:var(--buy-red)">買進：<span id="total-buy">0</span></span>
        <span style="color:var(--sell-green)">賣出：<span id="total-sell">0</span></span>
    </div>

    <div id="result" class="grid" style="display:none;">
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="buy-head">買超前十名 (張)</th></tr>
                    <tr><th>券商</th><th>買/賣</th><th>買超</th></tr>
                </thead>
                <tbody id="buy-body"></tbody>
            </table>
        </div>
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="sell-head">賣超前十名 (張)</th></tr>
                    <tr><th>券商</th><th>買/賣</th><th>賣超</th></tr>
                </thead>
                <tbody id="sell-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 截圖預覽層 -->
<div id="overlay">
    <div class="overlay-tip">截圖已產生！<br>請「長按圖片」選擇拷貝或儲存</div>
    <img id="previewImg" src="" alt="截圖預覽">
    <div class="close-btn" onclick="closeOverlay()">關閉預覽</div>
</div>

<script>
    // --- 產生預覽圖 ---
    async function generatePreview() {
        const btn = document.getElementById('shotBtn');
        const overlay = document.getElementById('overlay');
        const previewImg = document.getElementById('previewImg');

        try {
            btn.innerText = "⏳ 處理中...";
            btn.disabled = true;

            // 稍微延遲確保 UI 已更新
            await new Promise(r => setTimeout(r, 100));

            const canvas = await html2canvas(document.querySelector("#captureArea"), {
                scale: 2,
                useCORS: true,
                backgroundColor: "#ffffff",
                logging: false
            });

            // 將 Canvas 轉為 DataURL (Base64)
            const dataUrl = canvas.toDataURL("image/png");
            previewImg.src = dataUrl;
            
            // 顯示預覽層
            overlay.style.display = "flex";
            
            btn.innerText = "📸 產生截圖";
            btn.disabled = false;
        } catch (err) {
            console.error(err);
            alert("截圖失敗，請確認是否已上傳資料。");
            btn.innerText = "📸 產生截圖";
            btn.disabled = false;
        }
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = "none";
    }

    // --- CSV 解析功能 ---
    const fileInput = document.getElementById('csvFile');
    const status = document.getElementById('status');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        status.innerText = "正在解析數據...";
        const reader = new FileReader();
        reader.readAsText(file, 'Big5');
        reader.onload = function(event) {
            try {
                parseTwseCsv(event.target.result);
            } catch (err) {
                status.innerText = "❌ 解析失敗";
            }
        };
    });

    function parseTwseCsv(text) {
        const lines = text.split('\n');
        const brokerMap = {};
        let totalBuyQty = 0;
        let totalSellQty = 0;

        lines.forEach((line) => {
            const cols = line.replace(/"/g, '').split(',');
            if (cols.length >= 5) {
                processRow(cols[1], cols[3], cols[4], brokerMap, (b, s) => {
                    totalBuyQty += b; totalSellQty += s;
                });
            }
            if (cols.length >= 11) {
                processRow(cols[7], cols[9], cols[10], brokerMap, (b, s) => {
                    totalBuyQty += b; totalSellQty += s;
                });
            }
        });

        let resultArr = Object.keys(brokerMap).map(name => {
            const d = brokerMap[name];
            const net = Math.round((d.buy - d.sell) / 1000);
            return {
                name: name.replace(/^\d{4}\s*/, ''), 
                buy: Math.round(d.buy / 1000),
                sell: Math.round(d.sell / 1000),
                net: net
            };
        });

        const buyList = resultArr.filter(i => i.net > 0).sort((a, b) => b.net - a.net).slice(0, 10);
        const sellList = resultArr.filter(i => i.net < 0).sort((a, b) => Math.abs(b.net) - Math.abs(a.net)).slice(0, 10);

        document.getElementById('total-buy').innerText = Math.round(totalBuyQty / 1000) + " 張";
        document.getElementById('total-sell').innerText = Math.round(totalSellQty / 1000) + " 張";
        document.getElementById('summary-info').style.display = 'flex';

        renderTable('buy-body', buyList, 'up');
        renderTable('sell-body', sellList, 'down');

        document.getElementById('result').style.display = 'grid';
        status.innerText = "✅ 分析完成！";
    }

    function processRow(name, buy, sell, map, callback) {
        if (!name) return;
        const brokerName = name.trim();
        if (brokerName === "" || brokerName === "券商" || brokerName === "序號") return;
        const bQty = parseFloat(buy) || 0;
        const sQty = parseFloat(sell) || 0;
        if (!isNaN(bQty) && (bQty > 0 || sQty > 0)) {
            if (!map[brokerName]) map[brokerName] = { buy: 0, sell: 0 };
            map[brokerName].buy += bQty;
            map[brokerName].sell += sQty;
            callback(bQty, sQty);
        }
    }

    function renderTable(id, list, css) {
        document.getElementById(id).innerHTML = list.map(item => `
            <tr>
                <td style="text-align:left">${item.name}</td>
                <td style="color:#888; font-size:11px;">${item.buy}/${item.sell}</td>
                <td class="${css}">${Math.abs(item.net)}</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
