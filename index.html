<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7769 鴻勁 - 分點明細解析(修正版)</title>
    <style>
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .upload-box { border: 2px dashed #007bff; padding: 30px; text-align: center; border-radius: 10px; background: #f8fbff; margin-bottom: 20px; }
        .btn-select { background: #007bff; color: white; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .buy-head { background: #ff4d4f; color: white; }
        .sell-head { background: #52c41a; color: white; }
        .up { color: #d20000; font-weight: bold; }
        .down { color: #008000; font-weight: bold; }
        #status { margin-top: 10px; color: #666; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">7769 鴻勁 - 分點進出明細分析</h2>
    
    <div class="upload-box">
        <p>請上傳從證交所下載的 <b>分點進出明細 CSV</b></p>
        <label for="csvFile" class="btn-select">選擇檔案並分析</label>
        <input type="file" id="csvFile" accept=".csv">
        <div id="status">尚未選擇檔案</div>
    </div>

    <div id="result" class="grid" style="display:none;">
        <!-- 買超排行 -->
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="buy-head">買超前十名 (張)</th></tr>
                    <tr><th>券商</th><th>買/賣</th><th>買超</th></tr>
                </thead>
                <tbody id="buy-body"></tbody>
            </table>
        </div>
        <!-- 賣超排行 -->
        <div>
            <table>
                <thead>
                    <tr><th colspan="3" class="sell-head">賣超前十名 (張)</th></tr>
                    <tr><th>券商</th><th>買/賣</th><th>賣超</th></tr>
                </thead>
                <tbody id="sell-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('status').innerText = "讀取中: " + file.name;
        
        const reader = new FileReader();
        reader.readAsText(file, 'Big5');

        reader.onload = function(event) {
            const text = event.target.result;
            parseTwseCsv(text);
        };
    });

    function parseTwseCsv(text) {
        const lines = text.split('\n');
        const brokerMap = {}; 

        lines.forEach((line) => {
            // 移除引號並分割
            const cols = line.replace(/"/g, '').split(',');
            
            // 根據圖片修正後的索引：
            // 左半邊：券商[2], 買進[4], 賣出[5]
            if (cols.length >= 6) {
                processRow(cols[2], cols[4], cols[5], brokerMap);
            }
            // 右半邊：券商[7], 買進[9], 賣出[10]
            if (cols.length >= 11) {
                processRow(cols[7], cols[9], cols[10], brokerMap);
            }
        });

        // 轉換為陣列並計算買賣超
        let resultArr = Object.keys(brokerMap).map(name => {
            const d = brokerMap[name];
            const net = Math.round((d.buy - d.sell) / 1000);
            return {
                name: name,
                buy: Math.round(d.buy / 1000),
                sell: Math.round(d.sell / 1000),
                net: net
            };
        }).filter(item => item.name && item.name !== "券商" && item.name !== "序號" && isNaN(item.name));

        // 排序
        const buyList = resultArr.filter(i => i.net > 0).sort((a, b) => b.net - a.net).slice(0, 10);
        const sellList = resultArr.filter(i => i.net < 0).sort((a, b) => Math.abs(b.net) - Math.abs(a.net)).slice(0, 10);

        renderTable('buy-body', buyList, 'up');
        renderTable('sell-body', sellList, 'down');

        document.getElementById('result').style.display = 'grid';
        document.getElementById('status').innerText = "分析完成！";
    }

    function processRow(name, buy, sell, map) {
        if (!name) return;
        const brokerName = name.trim();
        
        // 過濾掉標題列或無效名稱
        if (brokerName === "" || brokerName === "券商" || !isNaN(brokerName)) return;

        const bQty = parseFloat(buy) || 0;
        const sQty = parseFloat(sell) || 0;

        if (!map[brokerName]) {
            map[brokerName] = { buy: 0, sell: 0 };
        }
        map[brokerName].buy += bQty;
        map[brokerName].sell += sQty;
    }

    function renderTable(id, list, css) {
        const tbody = document.getElementById(id);
        tbody.innerHTML = list.map(item => `
            <tr>
                <td style="text-align:left">${item.name}</td>
                <td style="color:#888; font-size:11px;">${item.buy} / ${item.sell}</td>
                <td class="${css}">${Math.abs(item.net)}</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
